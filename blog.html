<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Read my latest blog posts on web development, programming, and tech insights.">
    <meta name="og:title" content="My Blog - Tech Articles & Insights">
    <meta name="og:description" content="Explore articles on web development, programming, and technology.">
    <meta name="twitter:card" content="summary_large_image">
    <title>My Blog - Tech Articles & Insights</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    
    <!-- Advanced Styles -->
    <link rel="stylesheet" href="advanced-styles.css">
    
    <style>
        /* Blog Specific Styles */
        .blog-header {
            min-height: 40vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem 2rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, rgba(167, 139, 250, 0.05) 100%);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            margin-top: 60px;
        }

        .blog-header h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .blog-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .blog-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
            align-items: flex-end;
        }

        .search-box, .filter-select {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .search-box label, .filter-select label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .search-box input, .filter-select select {
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--radius-md);
            background: rgba(0, 212, 255, 0.05);
            color: var(--text-light);
            font-size: 1rem;
            transition: all var(--transition-fast);
        }

        .search-box input:focus, .filter-select select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
            background: rgba(0, 212, 255, 0.1);
        }

        .filter-select select {
            cursor: pointer;
        }

        .sort-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 0.75rem 1rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--radius-md);
            background: rgba(0, 212, 255, 0.05);
            color: var(--text-light);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 500;
        }

        .sort-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        .sort-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.15);
        }

        @media (max-width: 768px) {
            .blog-controls {
                grid-template-columns: 1fr;
            }
        }

        .blog-posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .blog-card {
            background: linear-gradient(135deg, rgba(15, 21, 53, 0.8), rgba(10, 14, 39, 0.8));
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
            height: 100%;
            backdrop-filter: blur(10px);
        }

        .blog-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 25px rgba(0, 212, 255, 0.15);
        }

        .blog-card-header {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .blog-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            width: fit-content;
            padding: 0.4rem 0.8rem;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(167, 139, 250, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .blog-card h3 {
            font-size: 1.5rem;
            color: var(--text-light);
            margin: 0.5rem 0;
            line-height: 1.3;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .blog-excerpt {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0.5rem 0;
        }

        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 2rem;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .blog-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .blog-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--bg-dark);
        }

        .read-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg-dark);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition-fast);
            margin-top: 1rem;
        }

        .read-more-btn:hover {
            transform: translateX(4px);
            box-shadow: 0 10px 15px rgba(0, 212, 255, 0.2);
        }

        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .error-message {
            padding: 1.5rem;
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid rgba(255, 0, 102, 0.3);
            border-radius: var(--radius-md);
            color: #ff6b9d;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .error-icon {
            font-size: 1.5rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: var(--radius-md);
            background: rgba(0, 212, 255, 0.05);
            color: var(--text-light);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 500;
        }

        .pagination button.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.15);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .view-count {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        @media (max-width: 768px) {
            .blog-header {
                padding: 3rem 1.5rem 1.5rem;
                margin-top: 60px;
            }

            .blog-container {
                padding: 2rem 1rem;
            }

            .blog-posts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <a class="logo" href="index.html">Portfolio</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="blog.html" style="color: var(--primary);">Blog</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <!-- Blog Header -->
    <div class="blog-header">
        <div>
            <h1>My Blog</h1>
            <p>Sharing insights on web development, programming, and technology trends.</p>
        </div>
    </div>

    <!-- Blog Container -->
    <div class="blog-container">
        <!-- Controls -->
        <div class="blog-controls">
            <div class="search-box">
                <label for="search-input">Search Posts</label>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search by title or content..."
                >
            </div>

            <div class="filter-select">
                <label for="category-filter">Filter by Category</label>
                <select id="category-filter">
                    <option value="">All Categories</option>
                </select>
            </div>

            <div class="filter-select">
                <label>Sort by</label>
                <div class="sort-controls">
                    <button class="sort-btn active" data-sort="newest">Newest</button>
                    <button class="sort-btn" data-sort="oldest">Oldest</button>
                    <button class="sort-btn" data-sort="popular">Popular</button>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message" style="display: none;">
            <span class="error-icon">⚠️</span>
            <span id="error-text"></span>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="loading-container" style="display: none;">
            <div class="spinner"></div>
            <span class="loading-text">Loading blog posts...</span>
        </div>

        <!-- Blog Posts Grid -->
        <div id="blog-posts-grid" class="blog-posts-grid"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <h3>No blog posts found</h3>
            <p>Check back soon for new articles!</p>
        </div>

        <!-- Pagination -->
        <div id="pagination-container" class="pagination" style="display: none;"></div>
    </div>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <script>
        const POSTS_PER_PAGE = 6;
        let allPosts = [];
        let currentPage = 1;
        let filteredPosts = [];
        let currentCategory = '';
        let currentSort = 'newest';
        let currentSearch = '';

        // DOM Elements
        const searchInput = document.getElementById('search-input');
        const categoryFilter = document.getElementById('category-filter');
        const sortButtons = document.querySelectorAll('.sort-btn');
        const blogPostsGrid = document.getElementById('blog-posts-grid');
        const loadingState = document.getElementById('loading-state');
        const emptyState = document.getElementById('empty-state');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const paginationContainer = document.getElementById('pagination-container');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadBlogPosts();
            setupEventListeners();
        });

        // Setup Event Listeners
        function setupEventListeners() {
            searchInput.addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                currentPage = 1;
                filterAndDisplayPosts();
            });

            categoryFilter.addEventListener('change', (e) => {
                currentCategory = e.target.value;
                currentPage = 1;
                filterAndDisplayPosts();
            });

            sortButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    sortButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSort = btn.dataset.sort;
                    currentPage = 1;
                    filterAndDisplayPosts();
                });
            });
        }

        // Load blog posts from Firestore
        async function loadBlogPosts() {
            showLoading(true);
            hideError();

            try {
                const snapshot = await db.collection('blog_posts')
                    .orderBy('date', 'desc')
                    .get();

                allPosts = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    date: doc.data().date ? new Date(doc.data().date.seconds * 1000) : new Date()
                }));

                // Populate category filter
                populateCategoryFilter();

                // Initial display
                filterAndDisplayPosts();
            } catch (error) {
                console.error('Error loading blog posts:', error);
                showError('Failed to load blog posts. Please try again later.');
                showLoading(false);
            }
        }

        // Populate category dropdown
        function populateCategoryFilter() {
            const categories = [...new Set(allPosts.map(post => post.category))].filter(Boolean);
            const select = document.getElementById('category-filter');
            
            categories.sort().forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                select.appendChild(option);
            });
        }

        // Filter and display posts
        function filterAndDisplayPosts() {
            filteredPosts = allPosts.filter(post => {
                const matchesCategory = !currentCategory || post.category === currentCategory;
                const matchesSearch = !currentSearch || 
                    post.title.toLowerCase().includes(currentSearch) ||
                    post.excerpt.toLowerCase().includes(currentSearch) ||
                    (post.content && post.content.toLowerCase().includes(currentSearch));
                
                return matchesCategory && matchesSearch;
            });

            // Sort posts
            sortPosts();

            // Display
            displayPosts();
            updatePagination();
            showLoading(false);
        }

        // Sort posts
        function sortPosts() {
            switch(currentSort) {
                case 'oldest':
                    filteredPosts.sort((a, b) => a.date - b.date);
                    break;
                case 'popular':
                    filteredPosts.sort((a, b) => (b.views || 0) - (a.views || 0));
                    break;
                case 'newest':
                default:
                    filteredPosts.sort((a, b) => b.date - a.date);
            }
        }

        // Display posts
        function displayPosts() {
            blogPostsGrid.innerHTML = '';

            if (filteredPosts.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const end = start + POSTS_PER_PAGE;
            const postsToDisplay = filteredPosts.slice(start, end);

            postsToDisplay.forEach(post => {
                const card = createBlogCard(post);
                blogPostsGrid.appendChild(card);
            });
        }

        // Create blog card
        function createBlogCard(post) {
            const card = document.createElement('div');
            card.className = 'blog-card';

            const date = post.date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });

            const authorInitial = post.author ? post.author.charAt(0).toUpperCase() : 'A';

            card.innerHTML = `
                <div class="blog-card-header">
                    <span class="blog-category-badge">${escapeHtml(post.category || 'General')}</span>
                    <h3>${escapeHtml(post.title)}</h3>
                    <p class="blog-excerpt">${escapeHtml(post.excerpt)}</p>
                </div>
                <div class="blog-card-meta">
                    <div class="blog-meta-item">
                        <span>📅</span>
                        <span>${date}</span>
                    </div>
                    <div class="blog-author">
                        <div class="author-avatar">${authorInitial}</div>
                        <span>${escapeHtml(post.author || 'Anonymous')}</span>
                    </div>
                    ${post.views ? `<div class="view-count">👁️ <span>${post.views}</span></div>` : ''}
                    <a href="blog-post.html?id=${post.id}" class="read-more-btn" style="margin-left: auto; margin-top: 0;">
                        Read More →
                    </a>
                </div>
            `;

            return card;
        }

        // Update pagination
        function updatePagination() {
            const totalPages = Math.ceil(filteredPosts.length / POSTS_PER_PAGE);
            paginationContainer.innerHTML = '';

            if (totalPages <= 1) {
                paginationContainer.style.display = 'none';
                return;
            }

            paginationContainer.style.display = 'flex';

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = i === currentPage ? 'active' : '';
                btn.addEventListener('click', () => {
                    currentPage = i;
                    displayPosts();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                paginationContainer.appendChild(btn);
            }
        }

        // Show loading state
        function showLoading(show) {
            loadingState.style.display = show ? 'flex' : 'none';
        }

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
        }

        // Hide error message
        function hideError() {
            errorMessage.style.display = 'none';
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
